services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-sso-app
    entrypoint: ["sh", "/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm", "-F"]
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel-sso

  web:
    image: nginx:1.27-alpine
    container_name: laravel-sso-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel-sso

  db:
    image: postgres:16-alpine
    container_name: laravel-sso-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravel_sso
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d laravel_sso"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - laravel-sso

volumes:
  db-data:
  vendor:

networks:
  laravel-sso:
    driver: bridge
